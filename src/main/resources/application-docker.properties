# ── Docker 환경 전용 설정 ──────────────────────────────────────────────────────
# SPRING_PROFILES_ACTIVE=docker 로 기동될 때 활성화되는 프로파일.
# 모든 민감 값은 .env 파일을 통해 환경 변수로 주입된다.
# 로컬 개발은 application-local.properties, CI는 application-test.properties 사용.

# ── 데이터소스 ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:ssac_db}?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DDL은 Flyway에게 위임한다. validate는 엔티티와 스키마 불일치를 기동 시 즉시 감지.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ── JWT ───────────────────────────────────────────────────────────────────────
# .env의 JWT_ACCESS_EXPIRATION, JWT_REFRESH_EXPIRATION을
# 기존 application.properties의 프로퍼티 키에 매핑한다.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_ACCESS_EXPIRATION:1800000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ── Kakao OAuth ───────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}

# ── Naver OAuth ───────────────────────────────────────────────────────────────
naver.oauth.client-id=${NAVER_CLIENT_ID}
naver.oauth.client-secret=${NAVER_CLIENT_SECRET}
naver.oauth.redirect-uri=${NAVER_REDIRECT_URI:http://localhost:8080/api/v1/auth/naver/callback}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── OAuth2 리디렉션 ──────────────────────────────────────────────────────────
oauth2.default-redirect-uri=${OAUTH2_DEFAULT_REDIRECT_URI:http://localhost:3000}
