# ── CI / 로컬 테스트 프로파일 ────────────────────────────────────────────────
# 이 프로파일은 두 가지 용도로 사용된다.
# 1) ./gradlew test 실행 시 (SPRING_PROFILES_ACTIVE=test)
# 2) swagger-contract.yml 워크플로우에서 서버를 기동할 때
#
# MySQL 없이 동작하도록 H2 인메모리 DB를 사용한다.
# H2 의존성: build.gradle의 runtimeOnly 'com.h2database:h2' 참고

spring.datasource.url=jdbc:h2:mem:ssactestdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# SQL 로그 활성화 — 테스트 환경에서 쿼리 가시성 확보 (prod: false)
spring.jpa.show-sql=true

# ── HikariCP 커넥션 풀 (테스트 환경) ─────────────────────────────────────────
# 인메모리 DB이므로 커넥션 수를 최소화한다 (prod: 20)
spring.datasource.hikari.maximum-pool-size=5

# ── Actuator (테스트 환경) ────────────────────────────────────────────────────
# 테스트 환경에서는 모든 엔드포인트를 노출한다 (prod: health, info만 노출)
management.endpoints.web.exposure.include=*
# H2 인메모리 사용, Redis 없음 → Redis 헬스체크 비활성화
management.health.redis.enabled=false
management.endpoint.health.show-details=always

# ── 에러 응답 (테스트 환경) ───────────────────────────────────────────────────
# 테스트 환경에서는 디버깅을 위해 스택 트레이스·메시지를 포함한다 (prod: never)
server.error.include-stacktrace=always
server.error.include-message=always

# ── 로깅 (테스트 환경) ────────────────────────────────────────────────────────
# 테스트 환경에서는 DEBUG 레벨로 상세 로그 출력 (prod: WARN)
logging.level.root=WARN
logging.level.com.ssac=DEBUG

# Swagger는 CI 환경에서도 반드시 활성화 (swagger.json 추출에 필요)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ── JWT (테스트 환경 더미 값) ────────────────────────────────────────────────
# HMAC-SHA256 최소 요건: 32바이트(256비트) 이상
jwt.secret=test-jwt-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
jwt.expiration-ms=3600000

# ── 네이버 OAuth (테스트 환경 더미 값) ──────────────────────────────────────
naver.oauth.client-id=test-client-id
naver.oauth.client-secret=test-client-secret
naver.oauth.redirect-uri=http://localhost:8080/api/v1/auth/naver/callback
