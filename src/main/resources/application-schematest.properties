# ── 스키마 검증 전용 프로파일 ──────────────────────────────────────────────────
# SchemaValidationTest 에서만 사용한다.
# Testcontainers MySQL + Flyway + ddl-auto=validate 조합으로
# 마이그레이션 누락을 CI 단계에서 감지한다.

# DB는 @ServiceConnection 이 Testcontainers에서 자동 주입하므로 여기서 설정 불필요

# ── Redis 비활성화 (스키마 검증 테스트에서는 불필요) ─────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
management.health.redis.enabled=false

# ── OAuth2 더미값 ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.kakao.client-id=test
spring.security.oauth2.client.registration.kakao.client-secret=test
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost/callback
naver.oauth.client-id=test
naver.oauth.client-secret=test
naver.oauth.redirect-uri=http://localhost/callback

# ── 기타 더미값 ───────────────────────────────────────────────────────────────
jwt.secret=test-jwt-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
cors.allowed-origins=http://localhost:3000
oauth2.default-redirect-uri=http://localhost:3000
