# ── 운영 환경(prod) 프로파일 ────────────────────────────────────────────────────
# SPRING_PROFILES_ACTIVE=prod 로 기동될 때 활성화된다.
#
# 보안 원칙:
#   - 모든 민감 값(DB 비밀번호, JWT 시크릿 등)은 환경 변수로 주입한다.
#   - 기본값(: 이후 fallback)을 명시하지 않아 변수 누락 시 즉시 기동 실패한다.
#   - 예: ${DB_PASSWORD} → 누락 시 "Could not resolve placeholder 'DB_PASSWORD'" 오류 발생
#
# 환경 변수 목록: docs/decisions/007-environment-profiles.md 참고

# ── 데이터소스 ─────────────────────────────────────────────────────────────────
spring:
  datasource:
    # Railway MySQL Plugin은 SSL을 지원하지 않으므로 useSSL=false
    # MySQL 8.0 caching_sha2_password 인증 시 RSA 공개키 조회 허용 (useSSL=false 환경 필수)
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # ── HikariCP 커넥션 풀 ──────────────────────────────────────────────────────
    hikari:
      pool-name: SsacHikariPool
      maximum-pool-size: 20       # 대규모 트래픽 대응 상향 (8 → 20); Railway 인스턴스 메모리 여유 확인 필요
      minimum-idle: 5             # 최소 유휴 커넥션 수 (pool-size 상향에 맞춰 조정)
      connection-timeout: 30000   # 커넥션 획득 대기 시간 (30초)
      idle-timeout: 600000        # 유휴 커넥션 유지 시간 (10분)
      max-lifetime: 1800000       # 커넥션 최대 수명 (30분)
      leak-detection-threshold: 60000  # 커넥션 누수 감지 임곗값 (1분)

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    # validate-on-migrate=false: 체크섬 불일치 무시 (파일 변경 후 재배포 시 오류 방지)
    # repair 전략: FlywayConfig.java의 FlywayMigrationStrategy가 repair() → migrate() 순 실행
    #   → FAILED 항목을 schema_history에서 제거 후 마이그레이션 재실행
    validate-on-migrate: false

  # ── JPA ──────────────────────────────────────────────────────────────────────
  jpa:
    show-sql: false               # SQL 로그 비활성화
    open-in-view: false           # OSIV 비활성화 — 불필요한 DB 세션 유지 방지 (메모리/커넥션 절약)
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate          # 운영 환경 DDL 자동 실행 금지 — Flyway가 스키마 관리
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  # ── OAuth2 (Kakao) ──────────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  # 옵션 B(안전성 우선): fallback 없음 → 누락 시 "Could not resolve placeholder" 즉시 기동 실패
  expiration-ms: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION}

# ── Naver OAuth ────────────────────────────────────────────────────────────────
naver:
  oauth:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ── Notion ─────────────────────────────────────────────────────────────────────
notion:
  api-key: ${NOTION_API_KEY}
  database-id: ${NOTION_DATABASE_ID}

# ── CORS ───────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ── OAuth2 리디렉션 ────────────────────────────────────────────────────────────
oauth2:
  default-redirect-uri: ${OAUTH2_DEFAULT_REDIRECT_URI}

# ── Actuator ──────────────────────────────────────────────────────────────────
# 운영 환경: 로드밸런서 헬스체크·정보 조회만 공개. metrics는 노출하지 않는다.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never   # 운영 환경 헬스 상세 정보 비공개 (DB/Redis 정보 노출 방지)

# ── 서버 보안 ─────────────────────────────────────────────────────────────────
server:
  error:
    include-stacktrace: never   # 스택 트레이스 외부 노출 금지
    include-message: never      # 에러 메시지 외부 노출 금지

# ── Sentry 에러 모니터링 ──────────────────────────────────────────────────────
sentry:
  # prod 프로파일에서만 활성화 (application.properties: sentry.enabled=false 전역 비활성화)
  enabled: true

  # DSN: Railway 대시보드 > Variables에 SENTRY_DSN 환경 변수로 주입
  dsn: ${SENTRY_DSN}

  # 환경 식별자 - Sentry 대시보드 필터링에 사용
  environment: production

  # 릴리즈 태깅 - Railway가 자동 제공하는 커밋 SHA로 어떤 배포에서 오류가 발생했는지 추적
  # 값이 없는 경우 unknown으로 fallback
  release: ${RAILWAY_GIT_COMMIT_SHA:unknown}

  # 성능 트레이싱 샘플링
  # 0.1 = 트래픽의 10%만 수집
  # 이유: 무료 티어 5,000건 한도를 에러 이벤트에 집중, 운영 초기 10% 후 트래픽 증가 시 상향 검토
  traces-sample-rate: 0.1

  # 개인정보 자동 수집 비활성화
  # 이유: 이메일/IP/쿠키 등 PII를 Sentry 서버에 전송 차단 (GDPR / 개인정보보호법 대응)
  send-default-pii: false

  # GlobalExceptionHandler보다 먼저 Sentry가 실행되도록 HIGHEST_PRECEDENCE 값 지정
  # 이유: 이 설정이 없으면 GlobalExceptionHandler에서 처리된 비즈니스 예외가 Sentry에 미전달
  exception-resolver-order: -2147483647

# ── 로깅 ──────────────────────────────────────────────────────────────────────
# logback-spring.xml의 prod 프로파일 JSON 구조화 로깅과 연계한다.
logging:
  level:
    root: WARN
    com.ssac: INFO                 # 서비스 패키지는 INFO 유지 (운영 모니터링 최소 요건)
    org.flywaydb: INFO             # Flyway 마이그레이션 실행 로그 (진단용)
    org.hibernate.SQL: OFF         # SQL 로그 완전 비활성화
    org.springframework.web: WARN
