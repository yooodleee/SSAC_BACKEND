spring.application.name=ssac-backend

# ── OpenAPI(Swagger) 계약 문서 ───────────────────────────────────────────────
# GET /api-docs/swagger.json  → 에이전트/프론트엔드가 소비하는 단일 계약 원본
# GET /swagger-ui.html        → 개발자 UI
springdoc.api-docs.path=/api-docs/swagger.json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
# 운영 환경에서 UI를 끄려면 아래 주석 해제
# springdoc.swagger-ui.enabled=false

# ── OAuth2 Configuration ───────────────────────────────────────────────────
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# ── JWT 설정 ─────────────────────────────────────────────────────────────────
# jwt.secret: 운영 환경에서는 반드시 환경 변수(JWT_SECRET)로 주입할 것 (최소 32자)
# jwt.expiration-ms: Access Token 만료 시간 (30분)
# jwt.refresh-expiration-ms: Refresh Token 만료 시간 (7일)
jwt.expiration-ms=1800000
jwt.refresh-expiration-ms=604800000

# ── Cookie 보안 설정 ───────────────────────────────────────────────────────────
# 운영 환경(HTTPS)에서는 COOKIE_SECURE=true 환경 변수를 주입할 것
# SameSite=Lax: CSRF 방어 + OAuth 리다이렉트(GET) 허용. 크로스 오리진 환경은 None으로 변경
cookie.secure=${COOKIE_SECURE:false}
cookie.same-site=${COOKIE_SAME_SITE:Lax}
