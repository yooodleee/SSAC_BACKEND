# ── 프로젝트 공통 설정 ──────────────────────────────────────────────────────
spring.application.name=ssac-backend

jwt.secret=${JWT_SECRET:vml-ssac-backend-default-secret-key-32-chars-minimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}


springdoc.api-docs.path=/api-docs/swagger.json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha



spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:your-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao



spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id



cookie.secure=${COOKIE_SECURE:false}
cookie.same-site=${COOKIE_SAME_SITE:Lax}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── DB 마이그레이션 (Flyway) ────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

oauth2.default-redirect-uri=${OAUTH2_DEFAULT_REDIRECT_URI:http://localhost:3000}

# ── Actuator 모니터링 ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
# readiness 그룹: redis는 docker 프로파일에서만 포함 (application-docker.properties)
management.endpoint.health.group.readiness.include=db,externalApi
management.health.db.enabled=true

# ── A/B 테스트 설정 ──────────────────────────────────────────────────────────
# enabled=true: 테스트 진행 중, false: 테스트 종료 (adopted-group 기준 단일 구조 반환)
# group-a-ratio: A 그룹 할당 비율 (0.0 ~ 1.0)
ab-test.menu.enabled=${AB_TEST_MENU_ENABLED:true}
ab-test.menu.adopted-group=${AB_TEST_MENU_ADOPTED_GROUP:A}
ab-test.menu.group-a-ratio=${AB_TEST_MENU_GROUP_A_RATIO:0.5}

# ── Cloudinary 이미지 업로드 ─────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── Notion 연동 ──────────────────────────────────────────────────────────────
notion.api-key=${NOTION_API_KEY:}
notion.database-id=${NOTION_DATABASE_ID:}

# ── Multipart 이미지 업로드 ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ── Sentry 에러 모니터링 ──────────────────────────────────────────────────────
# 전역 비활성화 — prod 프로파일에서만 활성화 (application-prod.yml)
# 이유: 로컬 개발자가 SENTRY_DSN을 잘못 설정한 경우 운영 Sentry에 이벤트 혼입 방지
sentry.enabled=false
