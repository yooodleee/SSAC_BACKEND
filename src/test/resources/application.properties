# 테스트 전용 설정 - 실제 외부 서비스와 연결하지 않음
# Flyway 비활성화: Flyway 스크립트는 MySQL 전용 PREPARE/EXECUTE 패턴을 사용하므로
# H2 인메모리 DB에서 실행 불가. 스키마는 JPA ddl-auto=create-drop 으로 생성한다.
# SchemaValidationTest는 @TestPropertySource 로 spring.flyway.enabled=true 를 재정의하여
# Testcontainers MySQL 에서 실제 마이그레이션을 검증한다.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
management.health.redis.enabled=false

jwt.secret=test-secret-key-that-is-at-least-32-characters-long
jwt.expiration-ms=1800000
jwt.refresh-expiration-ms=604800000

spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

naver.oauth.client-id=test-naver-client-id
naver.oauth.client-secret=test-naver-client-secret
naver.oauth.redirect-uri=http://localhost/api/v1/auth/naver/callback

cookie.secure=false
cookie.same-site=Lax
