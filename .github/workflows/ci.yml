name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # CI 체크 1: 컴파일
      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test --no-daemon

      # CI 체크 2: 스타일 검사
      - name: Checkstyle
        run: ./gradlew checkstyleMain --no-daemon

      # CI 체크 3: 전체 테스트 + 커버리지 측정 (ArchUnit 포함)
      - name: 테스트 실행 및 커버리지 측정
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      # CI 체크 4: 커버리지 기준 검증 (서비스 레이어 70% 미달 시 빌드 실패)
      - name: 커버리지 기준 검증
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      # CI 체크 5: 커버리지 리포트 아티팩트 업로드
      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/

      # CI 체크 6: PR 커버리지 코멘트 자동 게시
      - name: PR 커버리지 코멘트
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: '서비스 레이어 테스트 커버리지 리포트'
          update-comment: true

      # CI 체크 7: 테스트 결과 업로드 (실패 시 확인용)
      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: build/reports/tests/

# CI 체크 항목 요약:
# 1. ✅ 컴파일 통과 (gradlew build -x test)
# 2. ✅ Checkstyle 통과 (gradlew checkstyleMain)
# 3. ✅ 테스트 통과 + 커버리지 리포트 생성 (gradlew test jacocoTestReport)
# 4. ✅ 서비스 레이어 라인 커버리지 70% 이상 (gradlew jacocoTestCoverageVerification)
# 5. ✅ 커버리지 리포트 아티팩트 보존 (항상 실행)
# 6. ✅ PR 커버리지 코멘트 자동 게시 (madrapps/jacoco-report)
# 7. ✅ 테스트 결과 아티팩트 보존 (실패 시)
# 8. 👤 보안/비밀키 하드코딩 — PR 템플릿 리뷰어 체크리스트로 강제
