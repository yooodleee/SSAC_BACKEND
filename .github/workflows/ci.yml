name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      # CI 체크 1: 컴파일
      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test --no-daemon

      # CI 체크 2: 스타일 검사
      - name: Checkstyle
        run: ./gradlew checkstyleMain --no-daemon

      # CI 체크 3: 전체 테스트 + 커버리지 측정 (ArchUnit 포함)
      - name: 테스트 실행 및 커버리지 측정
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      # CI 체크 4: 커버리지 기준 검증 (서비스 레이어 70% 미달 시 빌드 실패)
      - name: 커버리지 기준 검증
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      # CI 체크 5: 커버리지 리포트 아티팩트 업로드
      - name: 커버리지 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/

      # CI 체크 6: PR 커버리지 코멘트 자동 게시
      - name: PR 커버리지 코멘트
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: '서비스 레이어 테스트 커버리지 리포트'
          update-comment: true

      # CI 체크 7: 테스트 결과 업로드 (실패 시 확인용)
      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: build/reports/tests/

  # ──────────────────────────────────────────────────────────────────────────────
  # profile-validation: test 프로파일 기동 검증 + prod 설정 파일 정적 검사
  # build-and-test와 병렬 실행 (독립적)
  # ──────────────────────────────────────────────────────────────────────────────
  profile-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test --no-daemon

      # ── 검증 1: test 프로파일 서버 기동 및 헬스체크 ──────────────────────────
      # H2 인메모리 DB로 서버를 기동하고 /actuator/health 응답을 확인한다.
      # test 프로파일 설정 변경이 서버 기동을 깨뜨리지 않음을 보장한다.
      - name: test 프로파일 서버 기동
        run: |
          ./gradlew bootRun \
            --args='--spring.profiles.active=test --server.port=8081' \
            --no-daemon &
          echo "BOOTRUN_PID=$!" >> "$GITHUB_ENV"

      - name: test 프로파일 헬스체크 (최대 60초 대기)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              http://localhost:8081/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ test 프로파일 정상 기동 (${i}번째 시도)"
              exit 0
            fi
            echo "  대기 중... HTTP $STATUS (${i}/30)"
            sleep 2
          done
          echo "❌ test 프로파일 기동 시간 초과"
          exit 1

      - name: test 프로파일 서버 종료
        if: always()
        run: |
          kill "$BOOTRUN_PID" 2>/dev/null || true
          pkill -f 'ssac-backend' 2>/dev/null || true

      # ── 검증 2: prod 프로파일 설정 파일 존재 여부 ────────────────────────────
      - name: prod 프로파일 설정 파일 존재 여부 확인
        run: |
          test -f src/main/resources/application-prod.yml \
            && echo "✅ application-prod.yml 존재" \
            || (echo "❌ application-prod.yml 없음" && exit 1)

      # ── 검증 3: prod 프로파일 하드코딩 시크릿 탐지 ──────────────────────────
      # password, secret, key 계열 설정 값이 ${...} 환경 변수 참조가 아닌
      # 리터럴 문자열로 선언되어 있으면 빌드를 실패시킨다.
      - name: prod 프로파일 하드코딩 시크릿 탐지
        run: |
          # 패턴: 'password:', 'secret:', 'jwt.secret:' 등의 키 뒤에
          #        환경 변수 참조(${...}) 없이 실제 값이 오는 경우를 탐지
          VIOLATIONS=$(grep -nE \
            '^\s*(password|secret|client-secret|client-id)\s*:\s*[^$#\n][^{]' \
            src/main/resources/application-prod.yml || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ prod 프로파일에 하드코딩된 민감 값이 발견되었습니다:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ 민감 값이 모두 환경 변수(\${...})로 참조됩니다"

      # ── 검증 4: prod 프로파일 필수 보안 설정 포함 여부 ──────────────────────
      - name: prod 프로파일 필수 보안 설정 확인
        run: |
          PROD_YML=src/main/resources/application-prod.yml
          ERRORS=0

          # ddl-auto: validate 확인
          if ! grep -q "ddl-auto: validate" "$PROD_YML"; then
            echo "❌ ddl-auto가 validate가 아닙니다 (운영 환경 DDL 자동 실행 금지)"
            ERRORS=$((ERRORS + 1))
          fi

          # include-stacktrace: never 확인
          if ! grep -q "include-stacktrace: never" "$PROD_YML"; then
            echo "❌ include-stacktrace가 never가 아닙니다 (스택 트레이스 노출 위험)"
            ERRORS=$((ERRORS + 1))
          fi

          # show-sql: false 확인
          if ! grep -q "show-sql: false" "$PROD_YML"; then
            echo "❌ show-sql이 false가 아닙니다 (SQL 로그 운영 노출 위험)"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ prod 프로파일 필수 보안 설정 ${ERRORS}개 누락"
            exit 1
          fi
          echo "✅ prod 프로파일 필수 보안 설정 모두 확인"

  # ──────────────────────────────────────────────────────────────────────────────
  # error-contract-validation: ErrorCode Enum ↔ contract/error-contract.yml 정합성 검증
  # build-and-test, profile-validation과 병렬 실행 (독립적)
  # ──────────────────────────────────────────────────────────────────────────────
  error-contract-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test --no-daemon

      # ── 검증 1: ErrorCode Enum ↔ Contract 정합성 ────────────────────────────
      - name: ErrorCode Contract 정합성 검증
        run: ./gradlew validateErrorContract --no-daemon

      # ── 검증 2: Contract 파일 커밋 여부 확인 ────────────────────────────────
      # validateErrorContract는 파일을 수정하지 않으므로,
      # 이 단계가 실패하면 다른 CI 단계가 contract 파일을 변조한 것이다.
      - name: Contract 파일 변경 여부 확인
        run: |
          git diff --exit-code contract/error-contract.yml \
            && echo "✅ contract/error-contract.yml 변경 없음" \
            || (echo "❌ contract/error-contract.yml이 커밋되지 않은 변경사항을 포함합니다." && exit 1)

      # ── 검증 3: ErrorCode 변경 시 Contract 버전 갱신 여부 확인 ──────────────
      # ErrorCode.java가 이 PR에서 변경된 경우 contract 파일의 version도 올라야 한다.
      - name: Contract 파일 버전 갱신 여부 확인
        run: |
          ERRORCODE_FILE="src/main/java/com/ssac/ssacbackend/common/exception/ErrorCode.java"
          CONTRACT_FILE="contract/error-contract.yml"

          CHANGED=$(git diff origin/master...HEAD -- "$ERRORCODE_FILE" 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️ ErrorCode.java 변경 없음, version 갱신 불필요"
            exit 0
          fi

          CURRENT=$(grep 'version:' "$CONTRACT_FILE" | head -1 \
            | sed 's/.*version: *"\(.*\)"/\1/')
          PREV=$(git show origin/master:"$CONTRACT_FILE" 2>/dev/null \
            | grep 'version:' | head -1 \
            | sed 's/.*version: *"\(.*\)"/\1/' || echo "0.0.0")

          if [ "$CURRENT" = "$PREV" ]; then
            echo "❌ ErrorCode.java가 변경되었지만 contract/error-contract.yml의 version이 갱신되지 않았습니다."
            echo "  현재 version: $CURRENT (이전과 동일)"
            echo "  버전 규칙: 추가 → Patch, 수정 → Minor, 삭제/변경 → Major"
            exit 1
          fi
          echo "✅ Contract 버전 갱신 확인: $PREV -> $CURRENT"

# CI 체크 항목 요약:
# ── build-and-test ──
# 1. ✅ 컴파일 통과 (gradlew build -x test)
# 2. ✅ Checkstyle 통과 (gradlew checkstyleMain)
# 3. ✅ 테스트 통과 + 커버리지 리포트 생성 (gradlew test jacocoTestReport)
# 4. ✅ 서비스 레이어 라인 커버리지 70% 이상 (gradlew jacocoTestCoverageVerification)
# 5. ✅ 커버리지 리포트 아티팩트 보존 (항상 실행)
# 6. ✅ PR 커버리지 코멘트 자동 게시 (madrapps/jacoco-report)
# 7. ✅ 테스트 결과 아티팩트 보존 (실패 시)
# ── profile-validation ──
# 8. ✅ test 프로파일 서버 기동 + /actuator/health 200 응답 확인
# 9. ✅ application-prod.yml 파일 존재 여부 확인
# 10. ✅ prod 프로파일 하드코딩 시크릿 탐지
# 11. ✅ prod 프로파일 필수 보안 설정 (ddl-auto, stacktrace, show-sql) 확인
# ── error-contract-validation ──
# 12. ✅ ErrorCode Enum ↔ Contract 정합성 검증 (gradlew validateErrorContract)
# 13. ✅ Contract 파일 미커밋 변경사항 탐지 (git diff)
# 14. ✅ ErrorCode 변경 시 Contract 버전 갱신 여부 확인
# ──────────────────────────────────────────────────────────────────────────────
# 👤 보안/비밀키 하드코딩 — PR 템플릿 리뷰어 체크리스트로 강제
