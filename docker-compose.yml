# ── 공통 기반 설정 ─────────────────────────────────────────────────────────────
# 이 파일 단독으로 실행하지 말 것.
# 개발: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# 운영: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  # ── Spring Boot 애플리케이션 ──────────────────────────────────────────────────
  app:
    build: .
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Alpine 이미지에는 curl이 없으므로 wget 사용
      # /actuator/health는 인증 없이 공개 접근 허용 (로드밸런서 헬스체크 용도)
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── 영속 볼륨 ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
  redis_data:
