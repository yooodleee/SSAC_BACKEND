# ── 개발 환경 오버라이드 ────────────────────────────────────────────────────────
# 실행: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# 빌드 포함: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Hot Reload 동작 방식:
#   1. IDE(IntelliJ)의 "Build Project Automatically" 활성화
#   2. IDE가 소스 변경을 감지해 build/classes/ 에 컴파일
#   3. 컨테이너 내 DevTools가 클래스 변경을 감지하고 컨텍스트 재시작

services:

  app:
    # builder 스테이지 이미지(JDK 포함)를 사용해 bootRun으로 기동
    build:
      context: .
      target: builder
    command: >
      ./gradlew bootRun
      --no-daemon
      -Pspring.profiles.active=docker
      -Dfile.encoding=UTF-8
    volumes:
      # 소스 코드 마운트: IDE 컴파일 결과가 컨테이너에 즉시 반영됨
      - .:/app
      # Gradle 캐시 볼륨: 재시작 시 의존성 재다운로드 방지
      - gradle_cache:/root/.gradle
    ports:
      - "8080:8080"
      # 원격 디버그 포트 (IntelliJ Remote JVM Debug 연결 가능)
      - "5005:5005"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
        -Dfile.encoding=UTF-8

  db:
    # 개발 환경에서 호스트에서 직접 DB 접속 가능
    ports:
      - "3306:3306"

  redis:
    # 개발 환경에서 호스트에서 직접 Redis 접속 가능
    ports:
      - "6379:6379"

volumes:
  gradle_cache:
