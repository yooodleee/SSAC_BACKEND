# ── 운영 환경 오버라이드 ────────────────────────────────────────────────────────
# 실행: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 빌드 포함: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:

  app:
    restart: always
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m -Dfile.encoding=UTF-8"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  db:
    restart: always
    # 운영 환경에서는 DB 포트를 외부에 노출하지 않음
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    # AOF 영속성 활성화: 재시작 후 데이터 복구 보장
    command: redis-server --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
